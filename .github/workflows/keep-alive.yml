name: Supabase Keep Alive

on:
  schedule:
    # 定时任务：每 2 天的 UTC 凌晨 0 点执行一次，安全避开 7 天休眠期
    - cron: '0 0 */2 * *'
  # 允许我们在 GitHub 网页上手动点击运行（方便测试）
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Supabase
        env:
          # 从 GitHub Secrets 中安全读取环境变量
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Starting to ping Supabase..."
          
          # 检查环境变量是否配置
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ Error: SUPABASE_URL or SUPABASE_ANON_KEY is missing in GitHub Secrets."
            exit 1
          fi

          # 发送极轻量的 API 请求（拉取 1 条数据的 ID）来激活数据库
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${SUPABASE_URL}/rest/v1/tickets?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json")
            
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Ping successful! Database is alive. HTTP Status: $RESPONSE"
          else
            echo "⚠️ Ping completed but returned HTTP Status: $RESPONSE"
          fi